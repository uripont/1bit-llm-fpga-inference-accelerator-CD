name: Deploy presentation

on:
  push:
    branches: [main]
    paths:
      - "presentation/**"
      - ".github/workflows/deploy-presentation.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: presentation/package-lock.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: presentation
        run: npm ci

      - name: Build presentation
        working-directory: presentation
        run: npm run build -- --base "${{ steps.pages.outputs.base_path }}/"

      - name: Upload presentation
        uses: actions/upload-pages-artifact@v4
        with:
          path: presentation/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
